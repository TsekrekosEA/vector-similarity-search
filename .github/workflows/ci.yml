name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # C++ Build & Smoke Test
  # ─────────────────────────────────────────────────────────────────
  cpp-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build C++ algorithms
        run: |
          cd cpp-ann-algorithms
          make build-all

      - name: Verify binaries exist
        run: |
          test -f cpp-ann-algorithms/bin/search
          test -f cpp-ann-algorithms/bin/benchmark

  # ─────────────────────────────────────────────────────────────────
  # Python Dependency Resolution (Neural LSH)
  # ─────────────────────────────────────────────────────────────────
  neural-lsh-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Resolve dependencies
        run: |
          cd neural_lsh
          uv sync --all-extras --no-install-project

      - name: Type check (mypy)
        run: |
          cd neural_lsh
          source .venv/bin/activate
          mypy --ignore-missing-imports *.py

  # ─────────────────────────────────────────────────────────────────
  # Python Dependency Resolution (Protein Search)
  # ─────────────────────────────────────────────────────────────────
  protein-search-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Resolve dependencies
        run: |
          cd protein_similarity_search
          uv sync --all-extras --no-install-project

      - name: Type check (mypy)
        run: |
          cd protein_similarity_search
          source .venv/bin/activate
          mypy --ignore-missing-imports *.py
